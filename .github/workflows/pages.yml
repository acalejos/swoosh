name: Deploy site to Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/*/src/**"
      - "packages/*/README.md"
      - "packages/model-router/site/**"
      - "packages/model-router/examples/**"
      - "scripts/gen-llms.ts"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Typecheck first: the examples import the real packages, so this fails the
      # deploy if any embedded example no longer compiles against the current API.
      - run: bun run check:tsc
      # Regenerate llms.txt / llms-full.txt / api/*.md / examples.html from source
      # so the deployed docs are always in sync with the code.
      - run: bun run docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/model-router/site
      - id: deployment
        uses: actions/deploy-pages@v4
