# CI template for refreshing the bundled capability dataset.
#
# This lives under the package while swoosh-capabilities is developed inside the
# monorepo; when the package is extracted to its own repo, move this file to
# `.github/workflows/` there so it actually runs. (Workflows only execute from a
# repo's top-level `.github/workflows/` directory.)
#
# It refreshes the models.dev base, re-applies the curated overrides, and opens a
# PR if the snapshot changed — so every refresh is reviewed, never auto-merged.
name: Refresh capabilities

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run refresh
        working-directory: packages/capabilities
      - name: Open PR if the snapshot changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(capabilities): refresh models.dev snapshot"
          title: "chore(capabilities): refresh models.dev snapshot"
          body: |
            Automated refresh of `swoosh-capabilities` from models.dev with the
            curated overrides re-applied. Review the diff for unexpected drift
            (removed models, pricing swings) before merging.
          branch: chore/refresh-capabilities
          add-paths: packages/capabilities/src/capabilities.generated.json
